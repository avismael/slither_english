# fly.toml app configuration file generated for slither-english on 2026-06-12T17:59:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'slither-english'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
